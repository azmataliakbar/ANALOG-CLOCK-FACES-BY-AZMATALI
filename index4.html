<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>3D Particle Clock</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; }
  body { font-family: 'Courier New', monospace; cursor: crosshair; }

  canvas { display: block; width: 100% !important; height: 100% !important; }

  /* ── HUD elements — all responsive via clamp() ── */
  #clock-text {
    position: fixed; top: clamp(10px, 3vw, 24px); left: clamp(10px, 3vw, 24px);
    color: rgba(255,255,255,0.45);
    font-size: clamp(9px, 2.2vw, 13px);
    letter-spacing: 0.18em;
    pointer-events: none;
    line-height: 1.7;
  }
  #clock-text .time  { font-size: clamp(14px, 4vw, 22px); font-weight: bold; letter-spacing: 0.12em; }
  #clock-text .date  { font-size: clamp(8px,  1.8vw, 11px); opacity: 0.6; margin-top: 2px; }

  #mode {
    position: fixed; top: clamp(10px, 3vw, 24px); right: clamp(10px, 3vw, 24px);
    color: rgba(255,255,255,0.5);
    font-size: clamp(7px, 1.6vw, 10px);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    pointer-events: none;
    text-align: right;
  }

  #info {
    position: fixed; bottom: clamp(12px, 3vw, 26px); left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.28);
    font-size: clamp(7px, 1.5vw, 10px);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    pointer-events: none;
    white-space: nowrap;
    text-align: center;
  }
  /* Hide verbose hints on tiny screens */
  @media (max-width: 400px) { #info .desktop-only { display: none; } }

  #pulse-ring {
    position: fixed; pointer-events: none; z-index: 10;
    width: clamp(28px, 6vw, 44px); height: clamp(28px, 6vw, 44px);
    border: 1px solid rgba(255,255,255,0.5);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    transition: border-color 0.25s, width 0.2s, height 0.2s;
    display: none;
  }
  @media (pointer: fine) { #pulse-ring { display: block; } }
</style>
</head>
<body>

<div id="clock-text">
  <div class="time">00:00:00</div>
  <div class="date"></div>
</div>
<div id="mode">[ ATTRACTOR ]</div>
<div id="info">
  <span>hover: attract</span>
  <span class="desktop-only"> &nbsp;|&nbsp; click: repel &nbsp;|&nbsp; drag: rotate &nbsp;|&nbsp; scroll: zoom</span>
</div>
<div id="pulse-ring"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
/* =====================================================
   3D INTERACTIVE PARTICLE CLOCK  v3
   Features:
   - Organic boundary jitter (Perlin-like noise per particle)
   - Exact system clock sync (Date API millisecond precision)
   - Fully responsive 270px → 4K
   ===================================================== */

// ── Responsive scale ──────────────────────────────────
function getScale() {
  const w = window.innerWidth, h = window.innerHeight;
  const minDim = Math.min(w, h);
  // Map 270px → scale 0.38, 768px → 1.0, 1440px+ → 1.3
  if (minDim <= 270)  return 0.38;
  if (minDim <= 400)  return 0.38 + (minDim - 270) / (400 - 270) * (0.55 - 0.38);
  if (minDim <= 768)  return 0.55 + (minDim - 400) / (768 - 400) * (1.0  - 0.55);
  if (minDim <= 1440) return 1.0  + (minDim - 768) / (1440- 768) * (1.25 - 1.0);
  return 1.3;
}

let SC = getScale(); // global scale factor

// ── Constants (base values, multiplied by SC at build) ──
const BASE_R    = 4.0;
const RINGS     = 40;
const PTS_RING  = 130;
const INFLUENCE = 1.7;
const STIFFNESS = 0.055;
const DAMPING   = 0.79;

// Jitter config — organic boundary animation
const JITTER_SPEED      = 0.0014;  // how fast the noise evolves
const JITTER_BOUNDARY   = 0.22;    // max XY jitter at boundary ring
const JITTER_INNER      = 0.04;    // less jitter near center
const JITTER_Z_SCALE    = 0.18;    // Z-depth oscillation amplitude

// ── Per-particle noise seeds (cheap pseudo-Perlin) ──────
let noiseSeeds; // Float32Array of (phase_x, phase_y, phase_z, freq) per particle

// ── Renderer ─────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x000000);
document.body.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.01, 200);

// ── Particle state ───────────────────────────────────────
let positions, velocities, origins, particleCount, particleMesh;
// ringFraction[i] = how far particle i is from center (0..1), used for jitter scaling
let ringFraction;

function buildDisk() {
  const R = BASE_R * SC;
  const pts = [];
  const rf  = []; // ring fraction per point

  // Center
  pts.push(0, 0, 0); rf.push(0);

  // Concentric rings
  for (let r = 0; r < RINGS; r++) {
    const t  = (r + 1) / (RINGS + 1);
    const rr = t * R;
    const count = Math.max(8, Math.round(PTS_RING * Math.sqrt(t)));
    for (let i = 0; i < count; i++) {
      const a  = (i / count) * Math.PI * 2;
      const jx = (Math.random() - 0.5) * 0.04 * SC;
      const jy = (Math.random() - 0.5) * 0.04 * SC;
      pts.push(rr * Math.cos(a) + jx, rr * Math.sin(a) + jy, 0);
      rf.push(t);
    }
  }

  // Hour markers — bright tight clusters
  for (let h = 0; h < 12; h++) {
    const a  = (h / 12) * Math.PI * 2 - Math.PI / 2;
    const mr = R * 0.9;
    for (let d = 0; d < 12; d++) {
      pts.push(
        mr * Math.cos(a) + (Math.random() - 0.5) * 0.08 * SC,
        mr * Math.sin(a) + (Math.random() - 0.5) * 0.08 * SC,
        0.03 * SC
      );
      rf.push(0.9);
    }
  }

  particleCount = pts.length / 3;
  positions     = new Float32Array(pts);
  velocities    = new Float32Array(particleCount * 3);
  origins       = new Float32Array(pts);
  ringFraction  = new Float32Array(rf);

  // Noise seeds: each particle gets unique random phases & freq
  noiseSeeds = new Float32Array(particleCount * 4);
  for (let i = 0; i < particleCount; i++) {
    noiseSeeds[i*4]   = Math.random() * Math.PI * 2;  // phase X
    noiseSeeds[i*4+1] = Math.random() * Math.PI * 2;  // phase Y
    noiseSeeds[i*4+2] = Math.random() * Math.PI * 2;  // phase Z
    noiseSeeds[i*4+3] = 0.6 + Math.random() * 0.8;    // individual freq multiplier
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3).setUsage(THREE.DynamicDrawUsage));

  const mat = new THREE.PointsMaterial({
    color: 0xffffff,
    size: 0.052 * SC,
    sizeAttenuation: true,
    transparent: true,
    opacity: 0.88,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });

  particleMesh = new THREE.Points(geo, mat);
  scene.add(particleMesh);
}

// ── Clock hands ───────────────────────────────────────────
let handH, handM, handS;
const clockGroup = new THREE.Group();
scene.add(clockGroup);

function buildHands() {
  // Clear old hands on rebuild
  while (clockGroup.children.length) clockGroup.remove(clockGroup.children[0]);

  const R = BASE_R * SC;
  const wht = () => new THREE.MeshBasicMaterial({ color: 0xffffff });

  const hg = new THREE.CylinderGeometry(0.032*SC, 0.012*SC, R*0.50, 8);
  hg.translate(0, R*0.25, 0);
  handH = new THREE.Mesh(hg, wht());
  handH.position.z = 0.15 * SC;
  clockGroup.add(handH);

  const mg = new THREE.CylinderGeometry(0.020*SC, 0.006*SC, R*0.75, 8);
  mg.translate(0, R*0.375, 0);
  handM = new THREE.Mesh(mg, wht());
  handM.position.z = 0.17 * SC;
  clockGroup.add(handM);

  const sg = new THREE.CylinderGeometry(0.009*SC, 0.009*SC, R*0.86, 8);
  sg.translate(0, R*0.43, 0);
  handS = new THREE.Mesh(sg, new THREE.MeshBasicMaterial({ color: 0xff5533 }));
  handS.position.z = 0.19 * SC;
  clockGroup.add(handS);

  // Second hand counterweight tail
  const tail = new THREE.CylinderGeometry(0.009*SC, 0.009*SC, R*0.18, 6);
  tail.translate(0, -R*0.09, 0);
  const tailM = new THREE.Mesh(tail, new THREE.MeshBasicMaterial({ color: 0xff5533 }));
  tailM.position.z = 0.19 * SC;
  // tailM shares same rotation as handS via group trick below
  clockGroup.add(tailM);
  handS.userData.tail = tailM;

  // Center cap
  clockGroup.add(new THREE.Mesh(
    new THREE.SphereGeometry(0.09*SC, 12, 12),
    new THREE.MeshBasicMaterial({ color: 0xffffff })
  ));
}

// ── System time sync (millisecond precision) ─────────────
// Uses Date.now() every frame — exact match to device clock
const DAYS   = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

function updateTime() {
  const d  = new Date();             // ← device local time, millisecond exact
  const h  = d.getHours();
  const m  = d.getMinutes();
  const s  = d.getSeconds();
  const ms = d.getMilliseconds();
  const h12 = h % 12;

  // Smooth continuous angles — sub-millisecond smooth
  // Correct angle: geometry cylinder points UP (+Y = 12 o'clock)
  // Clockwise rotation = negative Z in Three.js right-hand coords
  // No offset needed — zero rotation IS 12 o'clock
  const secA  = -((s  + ms / 1000)        / 60) * Math.PI * 2;
  const minA  = -((m  + (s + ms/1000)/60) / 60) * Math.PI * 2;
  const hourA = -((h12 + m/60 + s/3600)   / 12) * Math.PI * 2;

  handH.rotation.z = hourA;
  handM.rotation.z = minA;
  handS.rotation.z = secA;
  // Tail rotates with second hand
  if (handS.userData.tail) handS.userData.tail.rotation.z = secA;

  // Sync group tilt
  clockGroup.rotation.x = particleMesh.rotation.x;
  clockGroup.rotation.y = particleMesh.rotation.y;

  // Digital readout
  const ampm = h >= 12 ? 'PM' : 'AM';
  document.querySelector('#clock-text .time').textContent =
    String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0') + ' ' + ampm;
  document.querySelector('#clock-text .date').textContent =
    DAYS[d.getDay()] + ' ' + String(d.getDate()).padStart(2,'0') + ' ' + MONTHS[d.getMonth()] + ' ' + d.getFullYear();
}

// ── Mouse / touch interaction ─────────────────────────────
const mouseWorld = new THREE.Vector3(-9999, 0, 0);
const raycaster  = new THREE.Raycaster();
const hitPlane   = new THREE.Mesh(
  new THREE.PlaneGeometry(80, 80),
  new THREE.MeshBasicMaterial({ visible: false, side: THREE.DoubleSide })
);
scene.add(hitPlane);

const pulseRing = document.getElementById('pulse-ring');

let mode       = 'attract';
let isDragging = false;
let dragLast   = { x: 0, y: 0 };
let camTheta   = 0, camPhi = Math.PI / 2, camR = 10;
let targetTheta = 0, targetPhi = Math.PI / 2;
let autoRotate  = true;
let frame       = 0;

function projectMouse(cx, cy) {
  const ndcX =  (cx / innerWidth)  * 2 - 1;
  const ndcY = -(cy / innerHeight) * 2 + 1;
  raycaster.setFromCamera({ x: ndcX, y: ndcY }, camera);
  const hits = raycaster.intersectObject(hitPlane);
  if (hits.length) mouseWorld.copy(hits[0].point);
  return { ndcX, ndcY };
}

function setMode(m) {
  mode = m;
  const badge = document.getElementById('mode');
  badge.textContent = mode === 'repel' ? '[ REPELLER ]' : '[ ATTRACTOR ]';
  badge.style.color = mode === 'repel' ? 'rgba(255,100,50,0.85)' : 'rgba(255,255,255,0.5)';
  pulseRing.style.borderColor = mode === 'repel' ? 'rgba(255,100,50,0.7)' : 'rgba(255,255,255,0.5)';
}

function setupInteraction() {
  // ── Mouse ─────────────────────
  window.addEventListener('mousemove', e => {
    pulseRing.style.left = e.clientX + 'px';
    pulseRing.style.top  = e.clientY + 'px';

    const { ndcX, ndcY } = projectMouse(e.clientX, e.clientY);

    if (isDragging) {
      targetTheta += (e.clientX - dragLast.x) * 0.007;
      targetPhi = Math.max(0.25, Math.min(Math.PI - 0.25, targetPhi + (e.clientY - dragLast.y) * 0.007));
      dragLast = { x: e.clientX, y: e.clientY };
      autoRotate = false;
    } else {
      gsap.to(particleMesh.rotation, { x: -ndcY * 0.35, y: ndcX * 0.40, duration: 1.8, ease: 'power2.out' });
    }
  });

  window.addEventListener('mousedown', e => {
    if (e.button === 0) setMode(mode === 'attract' ? 'repel' : 'attract');
    if (e.button === 2 || e.button === 1) {
      isDragging = true;
      dragLast = { x: e.clientX, y: e.clientY };
    }
    e.preventDefault();
  });

  window.addEventListener('mouseup', () => {
    isDragging = false;
    setTimeout(() => { autoRotate = true; }, 3500);
  });

  window.addEventListener('mouseleave', () => mouseWorld.set(-9999, 0, 0));
  window.addEventListener('contextmenu', e => e.preventDefault());

  window.addEventListener('wheel', e => {
    camR = Math.max(3.5 * SC, Math.min(18 * SC, camR + e.deltaY * 0.015));
  }, { passive: true });

  // ── Touch ──────────────────────
  let lastT = null, touchStartTime = 0, touchMoved = false;

  window.addEventListener('touchstart', e => {
    touchStartTime = Date.now();
    touchMoved = false;
    lastT = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }, { passive: true });

  window.addEventListener('touchmove', e => {
    touchMoved = true;
    const t = e.touches[0];
    projectMouse(t.clientX, t.clientY);
    if (lastT) {
      targetTheta += (t.clientX - lastT.x) * 0.007;
      targetPhi = Math.max(0.25, Math.min(Math.PI - 0.25, targetPhi + (t.clientY - lastT.y) * 0.007));
      autoRotate = false;
    }
    lastT = { x: t.clientX, y: t.clientY };
  }, { passive: true });

  window.addEventListener('touchend', e => {
    // Quick tap = toggle mode
    if (!touchMoved && Date.now() - touchStartTime < 250) {
      setMode(mode === 'attract' ? 'repel' : 'attract');
    }
    lastT = null;
    mouseWorld.set(-9999, 0, 0);
    setTimeout(() => { autoRotate = true; }, 3500);
  });
}

// ── Particle physics + organic jitter ────────────────────
// Each particle independently oscillates using sine waves
// with its own seed phase and frequency — creates organic
// "living boundary" effect, stronger at outer rings
function updateParticles() {
  const pos    = particleMesh.geometry.attributes.position;
  const mx     = mouseWorld.x;
  const my     = mouseWorld.y;
  const active = mx !== -9999;
  const IR     = INFLUENCE * SC;
  const IR2    = IR * IR;
  const t      = frame * JITTER_SPEED; // global time for noise

  for (let i = 0; i < particleCount; i++) {
    const i3  = i * 3;
    const i4  = i * 4;
    let   px  = positions[i3],   py = positions[i3+1], pz = positions[i3+2];
    const ox  = origins[i3],     oy = origins[i3+1],   oz = origins[i3+2];
    let   vx  = velocities[i3],  vy = velocities[i3+1], vz = velocities[i3+2];

    const rf   = ringFraction[i];        // 0 = center, 1 = boundary
    const phX  = noiseSeeds[i4];
    const phY  = noiseSeeds[i4+1];
    const phZ  = noiseSeeds[i4+2];
    const freq = noiseSeeds[i4+3];

    // ── ORGANIC JITTER FORCE ──────────────────────────
    // Boundary particles jitter more; center barely moves
    const jitterAmp = (JITTER_INNER + rf * (JITTER_BOUNDARY - JITTER_INNER)) * SC;
    const jx = Math.sin(t * freq + phX) * jitterAmp;
    const jy = Math.cos(t * freq * 1.13 + phY) * jitterAmp;  // different freq for Y → irregular shape
    const jz = Math.sin(t * freq * 0.7  + phZ) * JITTER_Z_SCALE * SC * rf;

    // Spring toward jittered target (not raw origin) — this is key!
    const targetX = ox + jx;
    const targetY = oy + jy;
    const targetZ = oz + jz;

    vx += (targetX - px) * STIFFNESS;
    vy += (targetY - py) * STIFFNESS;
    vz += (targetZ - pz) * STIFFNESS;

    // ── MOUSE FORCE ───────────────────────────────────
    if (active) {
      const dx = px - mx, dy = py - my;
      const d2 = dx*dx + dy*dy;
      if (d2 < IR2 && d2 > 0.0001) {
        const dist = Math.sqrt(d2);
        const str  = Math.pow(1 - dist / IR, 2);
        if (mode === 'repel') {
          vx += (dx / dist) * str * 3.8 * SC;
          vy += (dy / dist) * str * 3.8 * SC;
          vz += (Math.random() - 0.5) * str * 0.9 * SC;
        } else {
          vx -= (dx / dist) * str * 2.4 * SC;
          vy -= (dy / dist) * str * 2.4 * SC;
          vz += Math.sin(frame * 0.09 + i * 0.06) * str * 0.3 * SC;
        }
      }
    }

    // ── BOWL WARP ─────────────────────────────────────
    const dc = Math.sqrt(ox*ox + oy*oy);
    const warp = Math.sin(dc / (BASE_R*SC) * Math.PI)
               * 0.38 * SC
               * Math.sin(frame * 0.0025 + dc * 0.22);
    vz += (oz + warp - pz) * 0.012;

    // Dampen & clamp
    vx *= DAMPING; vy *= DAMPING; vz *= DAMPING;
    const maxV = 0.32 * SC;
    vx = Math.max(-maxV, Math.min(maxV, vx));
    vy = Math.max(-maxV, Math.min(maxV, vy));
    vz = Math.max(-maxV, Math.min(maxV, vz));

    positions[i3]   = px + vx;
    positions[i3+1] = py + vy;
    positions[i3+2] = pz + vz;
    velocities[i3]  = vx; velocities[i3+1] = vy; velocities[i3+2] = vz;
  }

  pos.needsUpdate = true;
}

// ── Camera ────────────────────────────────────────────────
function updateCamera() {
  camTheta += (targetTheta - camTheta) * 0.06;
  camPhi   += (targetPhi   - camPhi)   * 0.06;
  camera.position.set(
    camR * Math.sin(camPhi) * Math.sin(camTheta),
    camR * Math.cos(camPhi),
    camR * Math.sin(camPhi) * Math.cos(camTheta)
  );
  camera.lookAt(0, 0, 0);
}

// ── Resize handler ────────────────────────────────────────
function onResize() {
  SC = getScale();
  camR = 10 * SC;
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);

  // Rebuild geometry at new scale
  scene.remove(particleMesh);
  particleMesh.geometry.dispose();
  particleMesh.material.dispose();
  buildDisk();
  buildHands();
}
window.addEventListener('resize', onResize);

// ── Animate ───────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  frame++;

  if (autoRotate) targetTheta += 0.0009;

  updateCamera();
  updateParticles();
  updateTime();
  renderer.render(scene, camera);
}

// ── Boot ──────────────────────────────────────────────────
camR = 10 * SC;
buildDisk();
buildHands();
setupInteraction();

// Entrance animation
particleMesh.scale.set(0.01, 0.01, 0.01);
clockGroup.scale.set(0.01, 0.01, 0.01);
gsap.to(particleMesh.scale, { x:1, y:1, z:1, duration:2.2, ease:'elastic.out(1, 0.5)', delay:0.15 });
gsap.to(clockGroup.scale,   { x:1, y:1, z:1, duration:2.2, ease:'elastic.out(1, 0.5)', delay:0.15 });

animate();
</script>
</body>
</html>
