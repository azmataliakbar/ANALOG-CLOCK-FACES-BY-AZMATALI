<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>3D Analog Clock</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
background:#000;
overflow:hidden;
font-family:Arial,Helvetica,sans-serif;
display:flex;
justify-content:center;
align-items:center;
}

#clock{

position:relative;

width:min(90vw,90vh);
height:min(90vw,90vh);

min-width:270px;
min-height:270px;

max-width:700px;
max-height:700px;

border-radius:50%;
border:6px solid #ffffff;

box-shadow:
0 0 30px rgba(255,255,255,.25),
0 0 80px rgba(255,255,255,.08);

}

.number{

position:absolute;

font-weight:900;

font-size:clamp(20px,3vw,42px);

color:white;

transform:translate(-50%,-50%);

user-select:none;

text-shadow:
0 0 10px white,
0 0 20px white;

}

.hand{

position:absolute;

left:50%;
bottom:50%;

transform-origin:bottom center;

border-radius:20px;

}

#hour{

width:8px;
height:25%;

background:white;

margin-left:-4px;

}

#minute{

width:5px;
height:35%;

background:white;

margin-left:-2.5px;

}

#second{

width:2px;
height:40%;

background:#ff5533;

margin-left:-1px;

}

#center{

position:absolute;

left:50%;
top:50%;

width:18px;
height:18px;

background:white;

border-radius:50%;

transform:translate(-50%,-50%);

box-shadow:0 0 20px white;

}

</style>

</head>

<body>

<div id="clock">

<div id="hour" class="hand"></div>

<div id="minute" class="hand"></div>

<div id="second" class="hand"></div>

<div id="center"></div>

</div>

<script>

const clock=document.getElementById("clock");

const hour=document.getElementById("hour");

const minute=document.getElementById("minute");

const second=document.getElementById("second");
// -------------------------------
// Create numbers 1–12
// -------------------------------

function createNumbers(){

    const size = clock.clientWidth;

    const radius = size * 0.42;

    for(let i=1;i<=12;i++){

        const num=document.createElement("div");

        num.className="number";

        num.textContent=i;

        const angle=(i-3)*30*Math.PI/180;

        const x=size/2 + radius*Math.cos(angle);

        const y=size/2 + radius*Math.sin(angle);

        num.style.left=x+"px";

        num.style.top=y+"px";

        clock.appendChild(num);

    }

}

createNumbers();


// -------------------------------
// Reposition numbers on resize
// -------------------------------

window.addEventListener("resize",()=>{

    document
        .querySelectorAll(".number")
        .forEach(e=>e.remove());

    createNumbers();

});


// -------------------------------
// Clock update
// -------------------------------

function updateClock(){

    const now=new Date();

    const h=now.getHours()%12;

    const m=now.getMinutes();

    const s=now.getSeconds();

    const ms=now.getMilliseconds();

    const secondDeg=(s+ms/1000)*6;

    const minuteDeg=(m+s/60)*6;

    const hourDeg=(h+m/60)*30;

    hour.style.transform=
        `translateX(-50%) rotate(${hourDeg}deg)`;

    minute.style.transform=
        `translateX(-50%) rotate(${minuteDeg}deg)`;

    second.style.transform=
        `translateX(-50%) rotate(${secondDeg}deg)`;

    requestAnimationFrame(updateClock);

}

updateClock();
// -------------------------------
// 3D tilt effect
// -------------------------------

let targetX = 0;
let targetY = 0;

let currentX = 0;
let currentY = 0;

document.addEventListener("mousemove",(e)=>{

    const x = (e.clientX / window.innerWidth - 0.5) * 20;
    const y = (e.clientY / window.innerHeight - 0.5) * -20;

    targetY = x;
    targetX = y;

});

function animateTilt(){

    currentX += (targetX-currentX)*0.08;
    currentY += (targetY-currentY)*0.08;

    clock.style.transform =
        `perspective(1000px)
         rotateX(${currentX}deg)
         rotateY(${currentY}deg)`;

    requestAnimationFrame(animateTilt);

}

animateTilt();


// -------------------------------
// Glow animation
// -------------------------------

let glow = 0;

function animateGlow(){

    glow += 0.02;

    const strength = 25 + Math.sin(glow) * 8;

    clock.style.boxShadow =
        `0 0 ${strength}px rgba(255,255,255,.35),
         0 0 ${strength*2}px rgba(255,255,255,.12)`;

    requestAnimationFrame(animateGlow);

}

animateGlow();

</script>

</body>
</html>
