<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Interactive Particle Clock</title>
<style>
html,body{margin:0;height:100%;background:#000;display:grid;place-items:center;overflow:hidden}
canvas{width:min(90vw,90vh);height:min(90vw,90vh);max-width:700px;max-height:700px;min-width:270px;min-height:270px;border:3px solid #fff;border-radius:50%;box-shadow:0 0 25px #fff3}
</style>
</head>
<body>
<canvas id="c" width="700" height="700"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
const cx=350,cy=350,R=320;
const mouse={x:-9999,y:-9999};
const parts=[];
for(let i=0;i<2500;i++){
 let a=Math.random()*Math.PI*2,r=Math.sqrt(Math.random())*(R-8);
 parts.push({ox:cx+Math.cos(a)*r,oy:cy+Math.sin(a)*r,x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r,vx:0,vy:0});
}
addEventListener('mousemove',e=>{
 const b=c.getBoundingClientRect();
 mouse.x=(e.clientX-b.left)*(700/b.width);
 mouse.y=(e.clientY-b.top)*(700/b.height);
});
addEventListener('mouseleave',()=>{mouse.x=-9999;});
function drawNums(){
 x.fillStyle="#fff";x.font="bold 34px Arial";x.textAlign="center";x.textBaseline="middle";
 for(let n=1;n<=12;n++){
   let ang=(n-3)*Math.PI/6;
   x.fillText(n,cx+Math.cos(ang)*(R-35),cy+Math.sin(ang)*(R-35));
 }
}
function loop(){
 requestAnimationFrame(loop);
 x.clearRect(0,0,700,700);
 x.beginPath();x.arc(cx,cy,R,0,Math.PI*2);x.strokeStyle="#fff";x.lineWidth=3;x.stroke();
 for(const p of parts){
   let dx=p.x-mouse.x,dy=p.y-mouse.y,d=Math.hypot(dx,dy);
   if(d<70){let f=(70-d)/70*2.5;p.vx+=(dx/(d||1))*f;p.vy+=(dy/(d||1))*f;}
   p.vx+=(p.ox-p.x)*0.02;p.vy+=(p.oy-p.y)*0.02;
   p.vx*=0.92;p.vy*=0.92;p.x+=p.vx;p.y+=p.vy;
   let rx=p.x-cx,ry=p.y-cy,rr=Math.hypot(rx,ry);
   if(rr>R-2){p.x=cx+rx/rr*(R-2);p.y=cy+ry/rr*(R-2);}
   x.fillStyle="#fff";x.fillRect(p.x,p.y,1.2,1.2);
 }
 const d=new Date(),ms=d.getMilliseconds()/1000,s=d.getSeconds()+ms,m=d.getMinutes()+s/60,h=(d.getHours()%12)+m/60;
 const hand=(len,w,a,col)=>{x.save();x.translate(cx,cy);x.rotate(a-Math.PI/2);x.strokeStyle=col;x.lineWidth=w;x.beginPath();x.moveTo(0,0);x.lineTo(len,0);x.stroke();x.restore();}
 hand(R*0.5,6,h*Math.PI/6,"#fff");hand(R*0.72,4,m*Math.PI/30,"#fff");hand(R*0.82,2,s*Math.PI/30,"#f44");
 x.beginPath();x.arc(cx,cy,6,0,Math.PI*2);x.fillStyle="#fff";x.fill();
 drawNums();
}
loop();
</script>
</body>
</html>
